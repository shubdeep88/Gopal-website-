<!DOCTYPE html>
<html>
<head>
  <title>File Share</title>

  <style>
    body {
      text-align: center;
      background: #0f2027;
      color: white;
      font-family: Arial;
    }

    button {
      padding: 10px 20px;
      background: #00ffd5;
      border: none;
      font-weight: bold;
      margin: 10px;
    }
  </style>
</head>

<body>

<h1>Share This Page 📤</h1>

<button onclick="share()">Share Website</button>

<script>
function share() {
  if (navigator.share) {
    navigator.share({
      title: "Gopal Website",
      text: "Check this awesome tools website 🔥",
      url: window.location.href
    });
  } else {
    alert("Sharing not supported on this device");
  }
}
</script>

</body>
</html>
