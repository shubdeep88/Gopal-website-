<!DOCTYPE html>
<html>
<head>
  <title>File Sharing Tool</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f2027;
      color: white;
    }

    input {
      margin: 15px;
    }

    button {
      padding: 10px 20px;
      background: #00ffd5;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #link {
      margin-top: 20px;
      color: #00ffd5;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h1>File Sharing Tool 📤</h1>

<input type="file" id="file"><br>

<button onclick="generateLink()">Generate Link</button>

<p id="link"></p>

<script>
function generateLink() {
  let file = document.getElementById("file").files[0];

  if(file) {
    let fakeLink = "https://gopalshare.com/" + file.name;
    document.getElementById("link").innerText = "Share Link: " + fakeLink;
  } else {
    alert("Please select a file");
  }
}
</script>

</body>
</html>
