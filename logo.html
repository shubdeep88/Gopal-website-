<!DOCTYPE html>
<html>
<head>
  <title>Logo Maker</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #0f2027;
      color: white;
    }

    input {
      padding: 10px;
      margin: 15px;
      width: 60%;
    }

    button {
      padding: 10px 20px;
      background: #00ffd5;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    #logo {
      margin-top: 30px;
      font-size: 40px;
      font-weight: bold;
      color: #00ffd5;
      text-shadow: 2px 2px 10px black;
    }
  </style>
</head>

<body>

<h1>Logo Maker 🎨</h1>

<input type="text" id="name" placeholder="Enter your name"><br>

<button onclick="makeLogo()">Generate Logo</button>

<div id="logo"></div>

<script>
function makeLogo() {
  let name = document.getElementById("name").value;

  document.getElementById("logo").innerHTML =
    "🔥 " + name + " 🔥";
}
</script>

</body>
</html>
